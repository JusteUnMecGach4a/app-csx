<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CSC Bar-le-Duc - App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css?v=10">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
</head>
<body>
    <header>
        <div style="display:flex; align-items:center; height:100%;">
            <img src="logovvv.png" id="logo" alt="Logo CSC">
            <span class="header-title">Centres Socioculturels<br>de Bar-le-Duc</span>
        </div>
        <nav id="top-nav" class="desktop-only">
            <a href="index.html" class="active">Accueil</a>
            <a href="activities.html">Activités</a>
            <a href="news.html">Actus</a>
            <a href="contact.html">Centres</a>
        </nav>
    </header>

    <main id="main-content">
        <div id="screen-home" class="screen active">
            <div class="top-dashboard-grid">
                <div class="welcome-card">
                    <h2>Bienvenue !</h2>
                    <p>Découvrez les activités et actualités de vos Centres Socioculturels.</p>
                </div>

                <!-- SECTION HORAIRES AVEC SELECTEUR -->
                <div class="news-card" style="border-left: 5px solid var(--primary); margin-bottom: 20px;">
                    <div class="news-body" style="padding:15px 20px">
                        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap;">
                            <div style="display:flex; align-items:center; gap:10px">
                                <svg width="20" height="20" viewBox="0 0 24 24">
                                    <path fill="var(--primary)" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z" />
                                    <path fill="var(--primary)" d="M12.5 7H11v6l5.25 3.15.75-1.23-4.5-2.67z" />
                                </svg>
                                <strong style="font-size:0.9rem; color:var(--primary)">HORAIRES</strong>
                            </div>
                            <div id="center-selector" style="display:flex; gap:5px; margin-top:5px;">
                                <div class="mini-tag active" onclick="setDynamicHours('marbot')">Marbot</div>
                                <div class="mini-tag" onclick="setDynamicHours('liberation')">Libé</div>
                                <div class="mini-tag" onclick="setDynamicHours('cote')">Côte</div>
                            </div>
                        </div>
                        <div id="dynamic-hours" style="font-size:0.85rem; display:grid; grid-template-columns: max-content auto; gap:5px 15px; align-items: center; line-height:1.4">
                            <!-- Rempli par le script -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="quick-grid">
                <a href="activities.html" class="q-card" style="text-decoration:none; color:inherit;">
                    <svg width="30" height="30" viewBox="0 0 24 24">
                        <path fill="#DB860E" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" />
                    </svg>
                    <span>Activités</span>
                </a>
                <a href="news.html" class="q-card" style="text-decoration:none; color:inherit;">
                    <svg width="30" height="30" viewBox="0 0 24 24">
                        <path fill="#4D94FF" d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H7v-2h8v2zm3-4H7v-2h11v2zm0-4H7V7h11v2z" />
                    </svg>
                    <span>Actualités</span>
                </a>
            </div>

            <h3 style="margin-bottom:15px">À la une</h3>
            <div id="home-news" class="loader grid-layout">Chargement...</div>
        </div>
    </main>

    <nav id="bottom-nav" class="mobile-only">
        <a href="index.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" /></svg>
            Accueil
        </a>
        <a href="activities.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" /></svg>
            Activités
        </a>
        <a href="news.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" /></svg>
            Actus
        </a>
        <a href="contact.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            Centres
        </a>
    </nav>
    <script src="app.js"></script>
</body>
</html>
